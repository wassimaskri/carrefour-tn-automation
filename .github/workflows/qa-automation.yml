name: Carrefour TN QA Automation

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cart-sentinel-carrefour-tn

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cart-sentinel-carrefour-tn/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run smoke tests
        run: npm run test:smoke
        env:
          HEADLESS: "true"
          RETRY: "1"
          VIDEO: retain-on-failure
          TRACE: retain-on-failure

      - name: Run mobile smoke tests
        run: npm run test:mobile
        env:
          HEADLESS: "true"
          RETRY: "1"
          VIDEO: retain-on-failure
          TRACE: retain-on-failure

      - name: Generate Allure report
        if: always()
        run: npm run allure:generate

      - name: Upload Cucumber and Allure artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-reports
          path: |
            cart-sentinel-carrefour-tn/reports/cucumber-report.html
            cart-sentinel-carrefour-tn/reports/cucumber-report.json
            cart-sentinel-carrefour-tn/allure-results
            cart-sentinel-carrefour-tn/reports/allure-report
            cart-sentinel-carrefour-tn/videos
            cart-sentinel-carrefour-tn/screenshots
            cart-sentinel-carrefour-tn/traces
